name: Backfill Full-Text Paper Analyses

on:
  workflow_dispatch:
    inputs:
      batch_size:
        description: "Maximum number of included papers to verify in this run"
        required: true
        default: "20"
      force_reanalysis:
        description: "Re-analyze papers already marked full-text verified"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: fulltext-backfill
  cancel-in-progress: false

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade openai pypdf

      - name: Curate and classify papers
        run: python scripts/classify_papers.py

      - name: Backfill full-text analyses
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          MAX_LLM_ANALYSES_PER_RUN: ${{ inputs.batch_size }}
          MAX_FULLTEXT_RETRIES: "3"
          ENABLE_FULL_TEXT_ANALYSIS: "true"
          FORCE_FULLTEXT_REANALYSIS: ${{ inputs.force_reanalysis }}
        run: python scripts/summarize_papers.py

      - name: Render and validate reports
        run: |
          python scripts/render_report.py
          python scripts/validate_catalog.py

      - name: Commit backfill results
        run: |
          git config user.name "paper-watch-bot"
          git config user.email "actions@github.com"
          git add data reports README.md
          git commit -m "Backfill full-text paper analyses" || echo "No changes to commit"
          git push
