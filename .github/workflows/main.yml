name: RISC Fuzz Security Paper Watch

on:
  schedule:
    - cron: "0 1 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade openai pypdf

      - name: Validate scripts
        run: python -m py_compile scripts/common.py scripts/fetch_papers.py scripts/classify_papers.py scripts/summarize_papers.py scripts/render_report.py

      - name: Fetch papers
        timeout-minutes: 12
        run: python scripts/fetch_papers.py

      - name: Classify papers
        run: python scripts/classify_papers.py

      - name: Summarize papers
        timeout-minutes: 10
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          MAX_LLM_ANALYSES_PER_RUN: 3
          ENABLE_FULL_TEXT_ANALYSIS: "true"
        run: python scripts/summarize_papers.py

      - name: Render reports
        run: python scripts/render_report.py

      - name: Commit updates
        run: |
          git config user.name "paper-watch-bot"
          git config user.email "actions@github.com"
          git add data reports README.md
          git commit -m "Update daily paper watch" || echo "No changes to commit"
          git push
