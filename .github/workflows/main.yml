name: Daily RISC Fuzz Security Paper Watch

on:
  schedule:
    - cron: "0 1 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-and-summarize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade openai pypdf

      - name: Fetch papers
        run: python scripts/fetch_papers.py

      - name: Classify papers
        run: python scripts/classify_papers.py

      - name: Summarize papers
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-pro
        run: python scripts/summarize_papers.py

      - name: Render reports
        run: python scripts/render_report.py

      - name: Commit updates
        run: |
          git config user.name "paper-watch-bot"
          git config user.email "actions@github.com"
          git add data reports README.md
          git commit -m "Update daily paper watch" || echo "No changes to commit"
          git push
