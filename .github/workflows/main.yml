name: RISC-V Processor Fuzzing Paper Watch

on:
  schedule:
    - cron: "0 1 */7 * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect-curate-and-summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade openai pypdf

      - name: Validate scripts
        run: >-
          python -m py_compile
          scripts/common.py
          scripts/fetch_papers.py
          scripts/classify_papers.py
          scripts/summarize_papers.py
          scripts/render_report.py
          scripts/validate_catalog.py

      - name: Fetch papers
        timeout-minutes: 18
        run: python scripts/fetch_papers.py

      - name: Curate and classify papers
        run: python scripts/classify_papers.py

      - name: Summarize included papers
        timeout-minutes: 25
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: gpt-4.1-mini
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_MODEL: deepseek-v4-flash
          MAX_LLM_ANALYSES_PER_RUN: 70
          ENABLE_FULL_TEXT_ANALYSIS: "true"
          MAX_FULLTEXT_RETRIES: "3"
        run: python scripts/summarize_papers.py

      - name: Render curated reports
        run: python scripts/render_report.py

      - name: Validate catalog
        run: python scripts/validate_catalog.py

      - name: Commit updates
        run: |
          git config user.name "paper-watch-bot"
          git config user.email "actions@github.com"
          git add data reports README.md
          git commit -m "Update curated processor security paper watch" || echo "No changes to commit"
          git push
